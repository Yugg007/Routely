server:
   port: 8004
   ssl:
      enabled: true
      key-store: src/main/resources/websocket-service-keystore.p12
      key-store-password: iampass
      key-store-type: PKCS12
      key-alias: websocket-service

      trust-store: src/main/resources/truststore.p12
# 🔑 Truststore (so user-service trusts Eureka's certificate)
      trust-store-password: iampass
      trust-store-type: PKCS12

spring:
   application:
      name: websocket-service

   kafka:
      bootstrap-servers: pkc-l7pr2.ap-south-1.aws.confluent.cloud:9092
      properties:
         security.protocol: SASL_SSL
         sasl.mechanism: PLAIN
         sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username='PJTHA3CNXJXXGFVK' password='cfltv0VdlqF5xdH088o7gpXG6c+8AyvNOQdwLNgnCBj4B1Dvgo3LBaN/BYl2BHbQ';
         consumer:
           group-id: trip-service-group
           key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
           value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
           auto-offset-reset: latest
      admin:
         client-id: user-service-admin


   datasource:
      url: jdbc:mysql://localhost:3306/routely
      username: root
      password: Iamroot@123
      driver-class-name: com.mysql.cj.jdbc.Driver

   jpa:
      hibernate:
         ddl-auto: update # Optional: create, create-drop, validate, update
      properties:
         hibernate:
            dialect: org.hibernate.dialect.MySQL8Dialect
   data:
      redis:
         host: localhost
         port: 6379
eureka:
   instance:
      hostname: localhost
      secure-port-enabled: true
      secure-port: 8004
      non-secure-port-enabled: false
      prefer-ip-address: false
      instance-id: ${spring.application.name}:${server.port}
      metadata-map:
         secure: true

   client:
      register-with-eureka: true # server itself doesn’t register
      fetch-registry: true
      service-url:
         defaultZone: https://localhost:8761/eureka/